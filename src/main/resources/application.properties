server.port=${PORT:9090}

#Mysql Configuration
spring.datasource.url = jdbc:postgresql://localhost:5432/moneymanager
spring.datasource.username = postgres
spring.datasource.password = 1234567890

server.servlet.context-path = /api/v1.0

#JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql = true
spring.jpa.properties.hibernate.format_sql = true

#Email Configuration

spring.mail.host = smtp-relay.brevo.com
spring.mail.port = 587
spring.mail.username = ${BREVO_USERNAME}
spring.mail.password = ${BREVO_PASSWORD}
spring.mail.properties.mail.smtp.auth = true
spring.mail.properties.mail.smtp.starttls.enable = true
spring.mail.properties.protocol = smtp
spring.mail.properties.mail.smtp.from = praveenpathmakaran@gmail.com

jwt.secret = ${JWT_SECRET}

money.manager.frontend.url = ${MONEY_MANAGER_FRONTEND_URL}

app.activation.url = ${MONEY_MANAGER_BACKEND_URL}

spring.profiles.active = prod
